<section>
  <div class="card">
    <div class="section-head">
      <div class="section-title" style="margin:0">Задачи</div>
      <button class="btn btn-primary btn-sm" id="addTaskBtn" type="button">+ Добавить</button>
    </div>

    <div class="filters" id="taskFilters">
      <button class="filter is-active" data-filter="all" type="button">Все</button>
      <button class="filter" data-filter="today" type="button">Сегодня</button>
      <button class="filter" data-filter="done" type="button">Готово</button>
    </div>
    
    <div class="filter-info muted" style="padding: 8px 0; font-size: 0.85em;">
      Выбран фильтр: <b id="activeFilterText">Все</b>
    </div>

    <ul class="task-list" id="tasksList"></ul>
  </div>
</section>

<!-- Красивое модальное окно в стиле Telegram -->
<form id="taskForm" class="task-form-overlay" style="display:none">
  <div class="task-modal">
    <div class="modal-header">
      <h3>Новая задача</h3>
      <p class="muted">Введите детали того, что нужно сделать</p>
    </div>
    
    <input type="text" id="title" class="form-input" placeholder="Название (минимум 3 символа)" required>
    <textarea id="description" class="form-input" placeholder="Описание задачи..." rows="3"></textarea>
    
    <div class="form-actions">
      <button type="button" class="btn-cancel" onclick="document.getElementById('taskForm').style.display='none'">Отмена</button>
      <button type="submit" class="btn-submit">Создать задачу</button>
    </div>
  </div>
</form>
